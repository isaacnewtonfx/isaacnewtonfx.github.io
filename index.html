	<title>Currency Converter</title>
	<link rel="stylesheet" type="text/css" href="/assets/css/bootstrap.css">
	<link rel="stylesheet" type="text/css" href="/assets/css/site.css">
 </head>
<body>

<!-- This column will push page content to the center -->
<div class="col-sm-4 visible-md visible-lg visible-xl"></div>

<div class="col-md-4">
	
	<img class="img-responsive" id="banner" src="assets/banner.jpg" alt="banner">

	<div class="alert alert-info" role="alert">
		<p>Welcome. Kindly select Currency From, Amount and select Currency To. Hit convert button when done.</p>
  		<p><i> Developed by @Isaac Newton - Team 81</i></p>
  		<p><i>#GoogleUdacityScholars #ALCwithGoogle #googleafrica</i></p>
	</div>

	<!-- From -->
	<select id="select-from" class="col-md-2 form-control">
		<option value="">Select the From Currency</option>
	</select>

	<br><br><br>

	<!-- Amount -->
	<input class="form-control" type="number" id="amount" value="1" placeholder="Enter Amount">

	<br><br>


	<!-- To -->
	<select id="select-to" class="col-md-2 form-control">
		<option value="">Select the To Currency</option>
	</select>

	<br><br><br>

	<!-- Convert button -->
	<button id="btn-convert" class="btn btn-lg btn-success">CONVERT CURRENCY</button>

	<br><br>			

	<!-- Output -->
	<p id="output" style="color:brown; font-weight: bolder;font-size:large;border:6px solid gray;border-style:ridge;padding:5px;height: 45px"></p>

			
</div>

<script type="text/javascript" src="/assets/javascript/jquery.js"></script>
<script type="text/javascript" src="/assets/javascript/bootstrap.js"></script>
<script type="text/javascript" src="/assets/javascript/index.js"></script>
</body>
</html>
